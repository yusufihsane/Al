<meta name="keywords" content="Shmart AI, yapay zeka, AI chat, akıllı asistan">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #07080d;
    --surface:   #0d0f18;
    --border:    #1a1d2e;
    --accent:    #ff0055;
    --accent2:   #ff4d84;
    --text:      #e8eaf0;
    --muted:     #4a4f6a;
    --user-bg:   #160818;
    --ai-bg:     #080d18;
    --glow:      0 0 20px #ff005540;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    /* Safari fix */
    -webkit-overflow-scrolling: touch;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, #ff005520 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50%       { opacity: 1;   transform: translateX(-50%) scale(1.1); }
  }

  header {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 820px;
    padding: 28px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow);
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    font-size: 14px;
    font-weight: bold;
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }

  .logo-text h1 span { color: var(--accent); }

  .logo-text p {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 3px;
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .chat-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 820px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
    overflow: hidden;
    min-height: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 4px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar {
    background: var(--user-bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
  }

  .msg.ai .avatar {
    background: var(--ai-bg);
    border: 1px solid #1a3a5c;
    color: #4d9fff;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.65;
    font-weight: 400;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2a0f1f;
    border-top-right-radius: 3px;
    color: var(--text);
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
    color: #c8d0e8;
  }

  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0);    opacity: 0.4; }
    30%            { transform: translateY(-6px); opacity: 1;   }
  }

  /* Input area — Safari fix */
  .input-area {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 820px;
    padding: 12px 16px 24px;
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 18px;
    gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  /* Safari input fix */
  #input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 400;
    padding: 8px 0;
    resize: none;
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
    /* Safari dark mode text fix */
    -webkit-text-fill-color: var(--text);
    opacity: 1;
  }

  #input::placeholder {
    color: var(--muted);
    -webkit-text-fill-color: var(--muted);
  }

  #sendBtn {
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: var(--glow);
    -webkit-appearance: none;
  }

  #sendBtn:hover  { background: var(--accent2); transform: scale(1.05); }
  #sendBtn:active { transform: scale(0.96); }
  #sendBtn:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; }
  #sendBtn svg { width: 18px; height: 18px; }

  .hint {
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-top: 10px;
    font-family: 'Share Tech Mono', monospace;
  }

  .welcome {
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.5s ease forwards;
  }

  .welcome h2 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 6px;
    margin-bottom: 10px;
  }

  .welcome h2 .accent { color: var(--accent); }

  .welcome p {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">S·AI</div>
  <div class="logo-text">
    <h1>SHMART <span>AI</span></h1>
    <p>POWERED BY GROQ × LLAMA</p>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    ONLINE
  </div>
</header>

<div class="chat-wrap">
  <div id="messages">
    <div class="welcome">
      <h2>SHMART <span class="accent">AI</span></h2>
      <p>Sana nasıl yardımcı olabilirim?</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <input id="input" type="text" placeholder="Mesajını yaz..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="sendBtn" onclick="gonder()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">ENTER ile gönder — LLaMA 3.1 8B</p>
</div>

<script>
  const input   = document.getElementById('input');
  const msgs    = document.getElementById('messages');
  const sendBtn = document.getElementById('sendBtn');
  let   ilk     = true;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); gonder(); }
  });

  function mesajEkle(icerik, tip) {
    if (ilk) {
      document.querySelector('.welcome')?.remove();
      ilk = false;
    }
    const div = document.createElement('div');
    div.className = `msg ${tip}`;
    div.innerHTML = `
      <div class="avatar">${tip === 'user' ? 'SEN' : 'S·AI'}</div>
      <div class="bubble">${icerik}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function typingEkle() {
    const div = document.createElement('div');
    div.className = 'msg ai typing';
    div.innerHTML = `
      <div class="avatar">S·AI</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function gonder() {
    const soru = input.value.trim();
    if (!soru) return;

    input.value = '';
    sendBtn.disabled = true;
    mesajEkle(soru, 'user');

    const typing = typingEkle();

    try {
      const res  = await fetch('/sor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ soru })
      });
      const data = await res.json();
      typing.remove();
      mesajEkle(data.cevap, 'ai');
    } catch {
      typing.remove();
      mesajEkle('Bağlantı hatası oluştu.', 'ai');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
